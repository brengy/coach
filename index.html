<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Coach - Excel Workout Importer</title>
<!-- Excel Reader -->
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
<!-- Simple Dumbbell Favicon -->
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect x='10' y='35' width='80' height='30' rx='5' fill='%23333'/><rect x='0' y='25' width='20' height='50' rx='5' fill='%23555'/><rect x='80' y='25' width='20' height='50' rx='5' fill='%23555'/></svg>">
<style>
  * { box-sizing: border-box; }
  body {
    font-family: Arial, sans-serif;
    background: #f4f6f8;
    margin: 0;
    padding: 20px;
  }
  .container {
    max-width: 900px;
    margin: 0 auto;
  }
  .card {
    background: white;
    border-radius: 12px;
    padding: 24px;
    margin-bottom: 20px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.1);
  }
  .card h2 {
    margin-top: 0;
    color: #111827;
  }
  .form-group {
    margin-bottom: 16px;
  }
  .form-group label {
    display: block;
    font-weight: 600;
    margin-bottom: 4px;
    color: #374151;
  }
  .form-group input {
    width: 100%;
    padding: 10px;
    border: 1px solid #d1d5db;
    border-radius: 8px;
    font-size: 14px;
  }
  .btn {
    padding: 12px 24px;
    border: none;
    border-radius: 8px;
    font-size: 16px;
    font-weight: bold;
    cursor: pointer;
    transition: 0.2s;
  }
  .btn-primary {
    background: #2563eb;
    color: white;
  }
  .btn-primary:hover {
    background: #1d4ed8;
  }
  .btn-success {
    background: #15803d;
    color: white;
  }
  .btn-success:hover {
    background: #166534;
  }
  .btn-secondary {
    background: #6b7280;
    color: white;
  }
  .btn-secondary:hover {
    background: #4b5563;
  }
  .message {
    padding: 12px;
    border-radius: 8px;
    margin-top: 12px;
    display: none;
  }
  .message.success {
    display: block;
    background: #d1fae5;
    color: #065f46;
  }
  .message.error {
    display: block;
    background: #fee2e2;
    color: #991b1b;
  }
  .message.info {
    display: block;
    background: #dbeafe;
    color: #1e40af;
  }
  .section-title {
    background: #111827;
    color: white;
    padding: 12px 16px;
    border-radius: 8px 8px 0 0;
    margin: 0 -24px 16px -24px;
    padding-left: 24px;
  }
  .import-summary {
    margin-top: 16px;
    padding: 15px;
    background: #eff6ff;
    border-radius: 8px;
    display: none;
  }
  .import-summary.visible {
    display: block;
  }
  .tag {
    display: inline-block;
    background: #dbeafe;
    padding: 2px 10px;
    border-radius: 12px;
    font-size: 12px;
    color: #1e40af;
    margin: 2px;
  }
  .flex-row {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    align-items: center;
  }
  .user-list {
    margin-top: 12px;
  }
  .user-list .tag {
    background: #dbeafe;
    padding: 4px 12px;
    border-radius: 12px;
    font-size: 13px;
    color: #1e40af;
    margin: 3px;
    display: inline-block;
  }
  .user-list .empty {
    color: #6b7280;
    font-size: 14px;
  }
  @media (max-width: 600px) {
    .flex-row {
      flex-direction: column;
      align-items: stretch;
    }
    .btn {
      width: 100%;
      text-align: center;
    }
  }
</style>
</head>
<body>

<div class="container">
  <h1>👨‍🏫 Coach - Excel Workout Importer</h1>
  <p>Upload Excel files to create workout plans for your clients</p>

  <!-- ===== USER LIST ===== -->
  <div class="card">
    <div class="section-title">
      <h2 style="margin:0;color:white;">👥 Users</h2>
    </div>
    <button class="btn btn-secondary" onclick="loadUsers()">📥 Load Users</button>
    <div class="user-list" id="userList"></div>
  </div>

  <!-- ===== EXCEL IMPORT ===== -->
  <div class="card">
    <div class="section-title">
      <h2 style="margin:0;color:white;">📥 Import Workout From Excel</h2>
    </div>

    <div class="form-group">
      <label>Username *</label>
      <input type="text" id="excelUsername" placeholder="e.g., john_doe">
    </div>

    <div class="form-group">
      <label>Select Excel File *</label>
      <input type="file" id="excelFile" accept=".xlsx,.xls">
    </div>

    <div class="flex-row">
      <button class="btn btn-primary" onclick="previewExcel()">👁️ Preview Excel Data</button>
      <button class="btn btn-success" onclick="importExcel()">📥 Convert & Save to Google Sheets</button>
    </div>

    <div id="excelMessage" class="message"></div>
    <div id="importSummary" class="import-summary"></div>
  </div>
</div>

<script>
// ============================================================
// HARDCODED API URL (Same as user.html)
// ============================================================
const API_URL = 'https://script.google.com/macros/s/AKfycbw_kuCLRNlNPoQIYBbuIx--pfDBFQgnEoXNh5yMDD28d3QwRjEWs459js6zKqyjICrI/exec';

// ============================================================
// API CALL
// ============================================================
async function callApi(action, data = {}) {
  try {
    const params = new URLSearchParams();
    params.append('action', action);
    Object.keys(data).forEach(key => {
      if (data[key] !== undefined && data[key] !== null && data[key] !== '') {
        params.append(key, data[key]);
      }
    });

    const url = API_URL + '?' + params.toString();
    console.log('API Request:', url);

    const response = await fetch(url, { method: 'GET' });
    if (!response.ok) {
      throw new Error('HTTP Error ' + response.status);
    }

    const result = await response.json();
    console.log('API Response:', result);
    return result;

  } catch (error) {
    console.error('API Error:', error);
    showMessage('excelMessage', '❌ Error: ' + error.message, 'error');
    return null;
  }
}

// ============================================================
// LOAD USERS
// ============================================================
async function loadUsers() {
  const result = await callApi('getUsers');
  if (result && result.status === 'success') {
    const userList = document.getElementById('userList');
    if (result.users && result.users.length > 0) {
      userList.innerHTML = result.users.map(u => 
        `<span class="tag">${escapeHtml(u)}</span>`
      ).join(' ');
    } else {
      userList.innerHTML = '<span class="empty">No users found. Upload an Excel file to create users!</span>';
    }
  }
}

// ============================================================
// EXCEL: PARSE AND PREVIEW
// ============================================================
let parsedExcelData = null;

function previewExcel() {
  const fileInput = document.getElementById('excelFile');
  const file = fileInput.files[0];
  if (!file) {
    showMessage('excelMessage', 'Please select an Excel file', 'error');
    return;
  }
  
  showMessage('excelMessage', '⏳ Reading Excel file...', 'info');
  
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const data = new Uint8Array(e.target.result);
      const result = parseExcelSmart(data);
      if (result) {
        parsedExcelData = result;
        displayPreview(result);
        showMessage('excelMessage', '✅ Preview generated successfully! Click "Convert & Save" to import.', 'success');
      }
    } catch (error) {
      showMessage('excelMessage', '❌ Error: ' + error.message, 'error');
      console.error(error);
    }
  };
  reader.readAsArrayBuffer(file);
}

// ============================================================
// SMART EXCEL PARSER
// ============================================================
function parseExcelSmart(data) {
  const workbook = XLSX.read(data, { type: 'array' });
  
  if (workbook.SheetNames.length < 2) {
    showMessage('excelMessage', 'Excel must have at least 2 sheets', 'error');
    return null;
  }

  const roadmapSheet = workbook.Sheets[workbook.SheetNames[0]];
  const roadmap = XLSX.utils.sheet_to_json(roadmapSheet, { header: 1, defval: '', blankrows: false });

  const exerciseSheet = workbook.Sheets[workbook.SheetNames[1]];
  const exerciseRows = XLSX.utils.sheet_to_json(exerciseSheet, { header: 1, defval: '', blankrows: false });

  const columnMap = detectColumnMapping(exerciseRows);
  console.log('Column Mapping:', columnMap);

  const majorSections = detectMajorSections(exerciseRows, columnMap);
  console.log('Major Sections Detected:', Object.keys(majorSections));

  const roadmapData = parseRoadmapSmart(roadmap, majorSections);
  console.log('Roadmap Data:', roadmapData);

  return {
    roadmap: roadmapData,
    majorSections: majorSections,
    columnMap: columnMap,
    totalExercises: Object.values(majorSections).reduce((sum, ex) => sum + ex.length, 0)
  };
}

// ============================================================
// DETECT MAJOR SECTIONS
// ============================================================
function detectMajorSections(rows, columnMap) {
  const sections = {};
  let currentMajor = null;
  let headerRowFound = false;
  let exerciseStartIndex = -1;

  const majorKeywords = [
    { keyword: 'Upper A', aliases: ['الجزء العلوي (Upper A)', 'علوي (Upper A)', 'Upper A'] },
    { keyword: 'Upper B', aliases: ['الجزء العلوي (Upper B)', 'علوي (Upper B)', 'Upper B'] },
    { keyword: 'Lower A', aliases: ['الجزء السفلي (Lower A & B)', 'سفلي (Lower A)', 'Lower A & B', 'Lower A'] },
    { keyword: 'Lower B', aliases: ['سفلي (Lower B)', 'Lower B'] }
  ];

  for (let i = 0; i < rows.length; i++) {
    const row = rows[i];
    const rowText = row.map(cell => String(cell || '').trim()).join(' ');

    if (!rowText.trim()) continue;

    let detectedMajor = null;
    for (const major of majorKeywords) {
      if (major.aliases.some(alias => rowText.includes(alias))) {
        detectedMajor = major.keyword;
        break;
      }
    }

    if (detectedMajor) {
      if (currentMajor && exerciseStartIndex !== -1) {
        const exercises = collectExercises(rows, exerciseStartIndex, i, columnMap);
        if (exercises.length > 0) {
          sections[currentMajor] = exercises;
        }
      }
      currentMajor = detectedMajor;
      headerRowFound = false;
      exerciseStartIndex = -1;
      continue;
    }

    if (currentMajor && row.some(cell => 
      String(cell || '').includes('اسم التمرين') || 
      String(cell || '').includes('Exercise') ||
      String(cell || '').includes('اسم التمرين (ENG)')
    )) {
      headerRowFound = true;
      exerciseStartIndex = i + 1;
      continue;
    }
  }

  if (currentMajor && exerciseStartIndex !== -1) {
    const exercises = collectExercises(rows, exerciseStartIndex, rows.length, columnMap);
    if (exercises.length > 0) {
      sections[currentMajor] = exercises;
    }
  }

  if (sections['Lower A'] && sections['Lower A'].length > 0) {
    sections['Lower B'] = sections['Lower A'].map(ex => ({ ...ex }));
  }

  return sections;
}

// ============================================================
// DETECT COLUMN MAPPING
// ============================================================
function detectColumnMapping(rows) {
  const mapping = {
    exercise: -1,
    arabic: -1,
    muscle: -1,
    sets: -1,
    reps: -1,
    rest: -1
  };

  for (let i = 0; i < rows.length; i++) {
    const row = rows[i];
    const rowText = row.map(cell => String(cell || '').trim());

    if (rowText.some(cell => cell.includes('اسم التمرين') || cell.includes('Exercise'))) {
      for (let j = 0; j < rowText.length; j++) {
        const cell = rowText[j];
        if (cell.includes('اسم التمرين (ENG)') || cell.includes('Exercise') || cell.includes('ENG')) {
          mapping.exercise = j;
        } else if (cell.includes('اسم التمرين (ARB)') || cell.includes('Arabic') || cell.includes('ARB')) {
          mapping.arabic = j;
        } else if (cell.includes('العضلة المستهدفة') || cell.includes('Muscle')) {
          mapping.muscle = j;
        } else if (cell.includes('المجموعات') || cell.includes('Sets')) {
          mapping.sets = j;
        } else if (cell.includes('التكرارات') || cell.includes('Reps')) {
          mapping.reps = j;
        } else if (cell.includes('الراحة') || cell.includes('Rest')) {
          mapping.rest = j;
        }
      }
      break;
    }
  }

  return mapping;
}

// ============================================================
// COLLECT EXERCISES
// ============================================================
function collectExercises(rows, startIdx, endIdx, columnMap) {
  const exercises = [];
  const { exercise, arabic, muscle, sets, reps, rest } = columnMap;

  for (let i = startIdx; i < endIdx; i++) {
    const row = rows[i];
    const rowText = row.map(cell => String(cell || '').trim()).join(' ');
    
    if (!rowText.trim()) continue;

    if (row.some(cell => 
      String(cell || '').includes('الجزء العلوي') || 
      String(cell || '').includes('الجزء السفلي') ||
      String(cell || '').includes('Upper') ||
      String(cell || '').includes('Lower')
    )) {
      break;
    }

    const exerciseName = exercise !== -1 ? String(row[exercise] || '').trim() : '';
    if (!exerciseName) continue;

    exercises.push({
      exercise: exerciseName,
      arabic: arabic !== -1 ? String(row[arabic] || '').trim() : '',
      muscle: muscle !== -1 ? String(row[muscle] || '').trim() : '',
      sets: sets !== -1 ? String(row[sets] || '').trim() : '',
      reps: reps !== -1 ? String(row[reps] || '').trim() : '',
      rest: rest !== -1 ? String(row[rest] || '').trim() : ''
    });
  }

  return exercises;
}

// ============================================================
// PARSE ROADMAP - CLEAN NAMES (Day 1, Week 1, etc.)
// ============================================================
function parseRoadmapSmart(rows, majorSections) {
  const output = [];
  
  console.log('Parsing roadmap with rows:', rows.length);
  
  let headerIndex = -1;
  for (let i = 0; i < rows.length; i++) {
    const row = rows[i];
    const rowText = row.map(cell => String(cell || '').trim()).join(' ');
    if (rowText.includes('الأسبوع') && rowText.includes('اليوم')) {
      headerIndex = i;
      console.log('Found header at row:', i, rowText);
      break;
    }
  }

  if (headerIndex === -1) {
    console.error('Roadmap header not found. Rows:', rows);
    return output;
  }

  let weekCounter = 1;
  for (let i = headerIndex + 1; i < rows.length; i++) {
    const row = rows[i];
    const weekRaw = String(row[1] || '').trim();
    console.log('Processing row:', i, 'Week raw:', weekRaw);
    
    if (!weekRaw) {
      console.log('Skipping empty week row');
      continue;
    }

    const weekClean = 'Week ' + weekCounter;
    weekCounter++;
    console.log('Week mapped to:', weekClean);

    for (let dayIndex = 2; dayIndex <= 8; dayIndex++) {
      if (row.length <= dayIndex) continue;
      
      const dayNameRaw = String(row[dayIndex] || '').trim();
      if (!dayNameRaw) continue;

      const dayNumber = dayIndex - 1;
      const dayClean = 'Day ' + dayNumber;
      console.log('  Day ' + dayNumber + ' raw:', dayNameRaw, '->', dayClean);

      if (dayNameRaw.includes('راحة') || dayNameRaw.toLowerCase().includes('rest')) {
        console.log('  -> Rest day, skipping');
        continue;
      }

      const major = detectMajorFromText(dayNameRaw);
      console.log('  -> Detected major:', major);
      
      if (!major) {
        console.log('  -> No major detected');
        continue;
      }
      
      if (!majorSections[major] || majorSections[major].length === 0) {
        console.log('  -> No exercises found for major:', major);
        continue;
      }

      console.log('  -> Adding ' + majorSections[major].length + ' exercises for ' + major);

      majorSections[major].forEach(exercise => {
        output.push({
          week: weekClean,
          day: dayClean,
          major: major,
          exercise: exercise.exercise,
          arabic: exercise.arabic,
          muscle: exercise.muscle,
          sets: exercise.sets,
          reps: exercise.reps,
          rest: exercise.rest
        });
      });
    }
  }

  console.log('Total roadmap entries:', output.length);
  return output;
}

// ============================================================
// DETECT MAJOR FROM TEXT
// ============================================================
function detectMajorFromText(text) {
  const value = String(text || '').toLowerCase().trim();
  
  if (value.includes('upper a') || value.includes('علوي (upper a)') || value.includes('علوي upper a')) {
    return 'Upper A';
  }
  if (value.includes('upper b') || value.includes('علوي (upper b)') || value.includes('علوي upper b')) {
    return 'Upper B';
  }
  if (value.includes('lower a') || value.includes('سفلي (lower a)') || value.includes('سفلي lower a')) {
    return 'Lower A';
  }
  if (value.includes('lower b') || value.includes('سفلي (lower b)') || value.includes('سفلي lower b')) {
    return 'Lower B';
  }
  
  return null;
}

// ============================================================
// DISPLAY PREVIEW
// ============================================================
function displayPreview(result) {
  const summary = document.getElementById('importSummary');
  
  let html = '<strong>📊 Excel Preview</strong><br><br>';
  
  html += '<strong>📋 Major Sections Found:</strong><br>';
  Object.keys(result.majorSections).forEach(major => {
    const exercises = result.majorSections[major];
    html += `<span class="tag">${major}</span> (${exercises.length} exercises)<br>`;
  });
  
  html += '<br><strong>📅 Roadmap Days:</strong><br>';
  const days = {};
  result.roadmap.forEach(item => {
    const key = item.week + ' - ' + item.day;
    if (!days[key]) days[key] = [];
    days[key].push(item.major);
  });
  Object.keys(days).forEach(day => {
    const majors = [...new Set(days[day])];
    html += `• ${day}: ${majors.join(', ')}<br>`;
  });
  
  html += `<br><strong>Total exercises to import:</strong> ${result.roadmap.length}`;
  
  summary.innerHTML = html;
  summary.classList.add('visible');
}

// ============================================================
// IMPORT EXCEL TO GOOGLE SHEETS
// ============================================================
async function importExcel() {
  const username = document.getElementById('excelUsername').value.trim();
  if (!username) {
    showMessage('excelMessage', 'Please enter a username', 'error');
    return;
  }

  const fileInput = document.getElementById('excelFile');
  const file = fileInput.files[0];
  if (!file) {
    showMessage('excelMessage', 'Please select an Excel file', 'error');
    return;
  }

  if (!parsedExcelData) {
    showMessage('excelMessage', '⏳ Parsing Excel file...', 'info');
    const reader = new FileReader();
    reader.onload = async function(e) {
      const data = new Uint8Array(e.target.result);
      const result = parseExcelSmart(data);
      if (result) {
        parsedExcelData = result;
        await uploadToGoogleSheets(username);
      }
    };
    reader.readAsArrayBuffer(file);
    return;
  }

  await uploadToGoogleSheets(username);
}

async function uploadToGoogleSheets(username) {
  if (!parsedExcelData || !parsedExcelData.roadmap || parsedExcelData.roadmap.length === 0) {
    showMessage('excelMessage', 'No data to upload. Please preview first.', 'error');
    return;
  }

  showMessage('excelMessage', '⏳ Uploading to Google Sheets...', 'info');
  
  let successCount = 0;
  let errorCount = 0;

  for (const workout of parsedExcelData.roadmap) {
    const data = {
      username: username,
      week: workout.week,
      day: workout.day,
      major: workout.major,
      exercise: workout.exercise,
      arabic: workout.arabic,
      muscle: workout.muscle,
      sets: workout.sets,
      reps: workout.reps,
      rest: workout.rest
    };

    const result = await callApi('addWorkout', data);
    if (result && result.status === 'success') {
      successCount++;
    } else {
      errorCount++;
    }
  }

  if (errorCount === 0) {
    showMessage('excelMessage', `✅ Import completed! ${successCount} exercises saved for "${username}".`, 'success');
  } else {
    showMessage('excelMessage', `⚠️ Import finished: ${successCount} succeeded, ${errorCount} failed.`, 'error');
  }

  loadUsers();
  parsedExcelData = null;
}

// ============================================================
// SHOW MESSAGES
// ============================================================
function showMessage(elementId, text, type) {
  const el = document.getElementById(elementId);
  if (!el) return;
  el.textContent = text;
  el.className = 'message ' + type;
  el.style.display = 'block';
  if (type === 'success' || type === 'info') {
    setTimeout(() => { el.style.display = 'none'; }, 8000);
  }
}

function escapeHtml(value) {
  return String(value || '')
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#039;');
}

// ============================================================
// PAGE LOAD
// ============================================================
window.onload = function() {
  loadUsers();
};
</script>

</body>
</html>
